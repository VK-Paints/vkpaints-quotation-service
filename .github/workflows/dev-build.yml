name: Dev Build
on:
  push:
    branches: [ dev ]
jobs:
  build:
    uses: VK-Paints/vkpaints-workflow/.github/workflows/build-push-dev.yml@main
    with:
      service_name: quotation-service
      smtp_server: ${{ vars.SMTP_SERVER }}
      smtp_port: ${{ vars.SMTP_PORT }}
      mail_from: ${{ vars.MAIL_FROM }}
    secrets: inherit

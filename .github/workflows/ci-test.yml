name: 🧪 CI Test Pipeline
on:
  pull_request:
    branches: [ main ]
jobs:
  test:
    uses: VK-Paints/vkpaints-workflow/.github/workflows/unified-pipeline.yml@main
    with:
      service_name: quotation-service
      smtp_server: ${{ vars.SMTP_SERVER }}
      smtp_port: ${{ vars.SMTP_PORT }}
      mail_from: ${{ vars.MAIL_FROM }}
    secrets: inherit

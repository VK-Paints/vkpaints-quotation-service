name: CI Pipeline

on:
  pull_request:
    branches: [ main ]
  push:
    tags:
      - 'v*'

jobs:
  test:
    if: github.event_name == 'pull_request'
    uses: VK-Paints/vkpaints-workflow/.github/workflows/reusable-ci-test.yml@main
    with:
      service_name: quotation-service
      smtp_server: ${{ vars.SMTP_SERVER }}
      smtp_port: ${{ vars.SMTP_PORT }}
      mail_from: ${{ vars.MAIL_FROM }}
    secrets: inherit

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    uses: VK-Paints/vkpaints-workflow/.github/workflows/reusable-ci-prod.yml@main
    with:
      service_name: quotation-service
      publish: true
      image_tag: ${{ github.ref_name }}
      smtp_server: ${{ vars.SMTP_SERVER }}
      smtp_port: ${{ vars.SMTP_PORT }}
      mail_from: ${{ vars.MAIL_FROM }}
    secrets: inherit



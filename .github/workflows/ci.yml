name: CI Pipeline
on:
  pull_request:
    branches: [ main ]
  push:
    tags:
      - 'v*'

jobs:
  test:
    if: github.event_name == 'pull_request'
    uses: VK-Paints/vkpaints-workflow/.github/workflows/reusable-ci-test.yml@main
    with:
      service_name: quotation-service
      smtp_server: ${{ vars.SMTP_SERVER }}
      smtp_port: ${{ vars.SMTP_PORT }}
      mail_from: ${{ vars.MAIL_FROM }}
    secrets: inherit

  build-and-push:
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    uses: VK-Paints/vkpaints-workflow/.github/workflows/reusable-ci-prod.yml@main
    with:
      service_name: quotation-service
      smtp_server: ${{ vars.SMTP_SERVER }}
      smtp_port: ${{ vars.SMTP_PORT }}
      mail_from: ${{ vars.MAIL_FROM }}
      image_tag: ${{ github.ref_name }}
    secrets: inherit

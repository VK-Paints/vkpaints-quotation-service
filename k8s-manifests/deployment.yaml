apiVersion: apps/v1
kind: Deployment
metadata:
  name: quotation-deploy
  namespace: vkpaints-dev-ns
spec:
  selector:
    matchLabels:
      app: quotation-service
  template:
    metadata:
      labels:
        app: quotation-service
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: quotation-service
            topologyKey: "kubernetes.io/hostname"
      containers:
      - name: quotation-container
        image: ghcr.io/vk-paints/vkpaints-quotation-service:v1.0.0
        imagePullPolicy: IfNotPresent
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        envFrom:
        - configMapRef:
            name: quotation-config
        # - secretRef:
        #     name: product-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 3003
          initialDelaySeconds: 5
          periodSeconds: 10

        ports:
        - containerPort: 3000
